<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: #1a1c1e;
            color: #e2e2e2;
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        .cell {
            background: #25282b;
            border: 1px solid #33373b;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            font-size: 36px;
            color: #ffffff;
            text-align: center;
            margin: 40px 0;
            letter-spacing: -0.5px;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        nav button {
            padding: 12px 24px;
            font-size: 15px;
            font-weight: 500;
            background-color: #33373b;
            color: #cfd8dc;
            border: 1px solid #454b50;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        nav button:hover {
            background: #4a5157;
            color: #ffffff;
            transform: translateY(-2px);
        }

        nav button.active {
            background: #007bff;
            border-color: #007bff;
        }

        .tabs-container {
            text-align: center;
            max-width: 800px;
            width: 100%;
        }

        .tab {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .tab.active {
            display: block;
        }

        img {
            display: block;
            margin: 20px auto;
            border-radius: 12px;
            max-width: 100%;
            opacity: 0.9;
        }

        .button1 #showBtn {
            background: #37474f;
            color: #eceff1;
            font-size: 15px;
            padding: 14px 36px;
            border-radius: 12px;
            font-weight: 600;
            border: 1px solid #455a64;
            cursor: pointer;
            margin: 20px auto;
            display: inline-block;
            transition: 0.3s;
        }

        .button1 #showBtn:hover {
            background: #455a64;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        }

        .big-picture-wrapper {
            position: fixed;
            top: -100%;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: rgba(10, 11, 12, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: top 0.5s ease;
            z-index: 9999;
        }

        .big-picture-wrapper.show {
            top: 0;
        }

        .close-btn {
            position: absolute;
            top: 30px;
            right: 40px;
            color: #90a4ae;
            cursor: pointer;
            font-size: 32px;
        }

        #dog-image:not([src]),
        #dog-image[src=""] {
            display: none;
        }

        .status{
             margin-top: 10px;
             font-weight: bold;
        }
        .result{
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <header>
        <nav>
            <button data-target="tab1"> Предстваление </button>
            <button data-target="tab2"> Про Меня </button>
            <button data-target="tab3"> бум </button>
        </nav>
    </header>

    <div class="tabs-container">
        <div id="tab1" class="tab active">
            <div class="cell">
                <h2>Привет!</h2>
                <p>Это первая вкладка с предствалениеем</p>
                <button id="showBtn">Показать картину</button>
                <div class="big-picture-wrapper" id="picWrapper">
                    <span class="close-btn" id="closeBtn">&times;</span>
                    <img
                        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRc45c_opBXcEg2Ol8Pot-oSQL1E6RVlTT-4g&s">
                </div>
                <img src="https://i.pinimg.com/736x/cd/ea/20/cdea2091fd89e2b4419573b53fa341b0.jpg" width="300px"
                    height="300px">
                <span class="piska">
                    <h1>Меня зовут Рубик и я просто студент второго курса по специальности программиста</h1>
                </span>
                <b1></b1>
            </div>
        </div>


        <div id="tab2" class="tab">
            <div class="cell">
                <h2>Здесь можете почитать про меня</h2>
                <img src="https://i.pinimg.com/736x/ce/94/bd/ce94bd7980a9dc35674059f3281b3841.jpg" width="300"
                    height="300">
                <h1>Я учусь в колледже информационных технологий ITHUB!</h1>
                <div id="image-container">
                    <img id="dog-image" src="" width="300" height="300">
                </div>
                <button id="btn1">показать фото</button>
                <div id="status"></div>
                <div id="result"></div>
                
                <b1></b1>
            </div>
        </div>

        <div id="tab3" class="tab">
            <div class="cell">
                <h2>ЕСЛИ НАЖМЕШЬ ТО БУДЕТ ЧТОТО ПЛАХОЕ</h2>
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQFcUZxKeYVNHFaUoIdcdX3wEs8zhUGqlevIg&s">
                <button id="changeColor" class="button1">О НЭД НЕ ДЕЛАЙ ЕТОГО</button>
                <b1></b1>
            </div>
        </div>

        <script>
            document.querySelectorAll('button[data-target]').forEach(button => {
                button.addEventListener('click', event => {
                    document.querySelectorAll('.tab').forEach(tab => {
                        console.log([tab.id, button])
                        tab.classList.toggle('active', tab.id == button.dataset.target);
                    })
                })
            })
            const button = document.getElementById('changeColor')
            button.addEventListener('click', () => {
                document.body.style.backgroundImage = "url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRmg_NdvZRUTy_MGtls_kQLuvMvxMZWNE9bjQ&s')"
                document.body.style.backgroundRepeat = 'no-repeat';
                document.body.style.backgroundSize = 'cover';
                document.body.style.backgroundAttachment = 'fixed';
                document.body.style.backgroundPosition = 'center';

            });

            const btn = document.getElementById('showBtn');
            const wrapper = document.getElementById('picWrapper');
            const close = document.getElementById('closeBtn');
            btn.addEventListener('click', () => {
                wrapper.classList.add('show');
            });

            close.addEventListener('click', () => {
                wrapper.classList.remove('show');
            });

            const btn1 = document.getElementById('btn1');
            console.log(btn1)
            const statusDiv = document.getElementById('status');
            const resultDiv = document.getElementById('result');

            async function fetchData() {
                btn1.disabled = true; 
                btn1.textContent = 'Loading...'; 

                statusDiv.innerHTML = '<div class="loading">Request in progress...</div>';
                resultDiv.innerHTML = '';

                try {
                    const resp = await fetch('https://nekos.best/api/v2/neko');

                    if (!resp.ok) {
                        throw new Error(`HTTP error: ${resp.status} ${resp.statusText}`);
                    }

                    const data = await resp.json();
                    const imageUrl = data.results[0].url;

                    statusDiv.innerHTML = '<div class="success">Your photo is here!</div>';
                    resultDiv.innerHTML = `<strong>Here is an your photo</strong><br><br>
                    <img src="${imageUrl}" alt="Neko image" style="max-width: 100%; max-height: 400px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); margin: 10px 0;"><br><br>`;

                } catch (error) {
                    console.error('Error:', error);
                    statusDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
                    resultDiv.innerHTML = `<div class="error">There will be no your photo:(</div>`;
                } finally {
                    btn1.disabled = false;
                    btn1.textContent = 'Request';
                }
            }

            btn1.addEventListener('click', fetchData);


        </script>
</body>
</html>
